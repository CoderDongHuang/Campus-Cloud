server:
  port: 8085

spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/campus_payment?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: ${MQ_PASSWORD}

campus:
  payment:
    mock: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
