# 校享云 — GitHub Actions CI/CD Pipeline
# 放到 .github/workflows/ci.yml
name: Campus Cloud CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: campus-cloud

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Unit Test
        run: mvn test -pl campus-auth -am

  docker-build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - campus-gateway
          - campus-auth
          - campus-user
          - campus-product
          - campus-order
          - campus-payment
          - campus-coupon
          - campus-settlement
          - campus-tenant
          - campus-search
          - campus-im
          - campus-notify
          - campus-review
          - campus-file
          - campus-data
    steps:
      - uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: campus-scripts/docker/Dockerfile
          build-args: SVC=${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.service }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.service }}:latest

  deploy-to-k8s:
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to K8s
        run: |
          kubectl apply -f campus-scripts/k8s/namespace.yaml
          kubectl apply -f campus-scripts/k8s/deployment.yaml
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
