# 校享云 — Logstash 日志采集配置
# 接收 Filebeat/应用直推的日志，解析后写入 ES

input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # 解析 Spring Boot JSON 日志
  if [logger_name] {
    mutate {
      add_field => { "service" => "%{[logger_name]}" }
    }
  }
  # 标记 ERROR 级别
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "campus-cloud-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
