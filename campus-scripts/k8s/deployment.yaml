# 校享云 — K8s 部署清单
# 以 campus-order 为例，其他 14 个服务结构相同，替换 SVC/port/replicas 即可
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: campus-order-config
  namespace: campus-cloud
data:
  application.yml: |
    server:
      port: 8080
    spring:
      datasource:
        url: jdbc:mysql://shardingsphere-proxy.campus-cloud.svc:3308/order_db
        username: ${DB_USER}
        password: ${DB_PASS}
      data:
        redis:
          host: redis.campus-cloud.svc
          port: 6379
          password: ${REDIS_PASS}
      rabbitmq:
        host: rabbitmq.campus-cloud.svc
        port: 5672
        username: ${MQ_USER}
        password: ${MQ_PASS}
      cloud:
        nacos:
          discovery:
            server-addr: nacos.campus-cloud.svc:8848
    xxl:
      job:
        admin:
          addresses: http://xxl-job-admin.campus-cloud.svc:8080/xxl-job-admin
        executor:
          appname: campus-order
          port: 9999
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campus-order
  namespace: campus-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campus-order
  template:
    metadata:
      labels:
        app: campus-order
    spec:
      containers:
        - name: campus-order
          image: registry.cn-hangzhou.aliyuncs.com/campus-cloud/campus-order:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: campus-cloud-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: campus-order-config
---
apiVersion: v1
kind: Service
metadata:
  name: campus-order
  namespace: campus-cloud
spec:
  selector:
    app: campus-order
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Secret 模板（实际值通过 kubectl create secret 注入，不写入仓库）
