# ==================== Gateway 本地配置 ====================
# 可被 Nacos 配置中心覆盖

server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true           # 自动从 Nacos 发现服务
          lower-case-service-id: true
      routes:
        # ===== 认证服务 =====
        - id: campus-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        # ===== 用户服务 =====
        - id: campus-user
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/user/**
        # ===== 商品服务 =====
        - id: campus-product
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/product/**
        # ===== 订单服务 =====
        - id: campus-order
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/order/**
        # ===== 支付服务 =====
        - id: campus-payment
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/payment/**
        # ===== 优惠券服务 =====
        - id: campus-coupon
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/coupon/**
        # ===== 结算服务 =====
        - id: campus-settlement
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/settlement/**
        # ===== 搜索服务 =====
        - id: campus-search
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/search/**
        # ===== IM 服务 =====
        - id: campus-im
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/im/**
        # ===== 通知服务 =====
        - id: campus-notify
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/notify/**
        # ===== 评价服务 =====
        - id: campus-review
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/review/**
        # ===== 文件服务 =====
        - id: campus-file
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/file/**
        # ===== 数据服务 =====
        - id: campus-data
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/data/**
        # ===== 租户服务 =====
        - id: campus-tenant
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/tenant/**
      # CORS 全局配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# ==================== 网关白名单 ====================
campus:
  security:
    white-urls:
      - /api/v1/auth/login
      - /api/v1/auth/login/sms
      - /api/v1/auth/register
      - /api/v1/auth/sms/send
      - /api/v1/product/**
      - /doc.html
      - /v3/api-docs/**
