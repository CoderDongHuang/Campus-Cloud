# ==================== Gateway 本地配置 ====================
server:
  port: 8080

spring:
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
      discovery:
        locator:
          enabled: false
      routes:
        - id: campus-auth
          uri: lb://campus-auth
          predicates:
            - Path=/api/v1/auth/**
        - id: campus-user
          uri: lb://campus-user
          predicates:
            - Path=/api/v1/user/**
        - id: campus-product
          uri: lb://campus-product
          predicates:
            - Path=/api/v1/product/**
        - id: campus-order
          uri: lb://campus-order
          predicates:
            - Path=/api/v1/order/**
        - id: campus-payment
          uri: lb://campus-payment
          predicates:
            - Path=/api/v1/payment/**
        - id: campus-coupon
          uri: lb://campus-coupon
          predicates:
            - Path=/api/v1/coupon/**
        - id: campus-settlement
          uri: lb://campus-settlement
          predicates:
            - Path=/api/v1/settlement/**
        - id: campus-search
          uri: lb://campus-search
          predicates:
            - Path=/api/v1/search/**
        - id: campus-im
          uri: lb://campus-im
          predicates:
            - Path=/api/v1/im/**
        - id: campus-im-ws
          uri: lb://campus-im
          predicates:
            - Path=/ws/**
        - id: campus-notify
          uri: lb://campus-notify
          predicates:
            - Path=/api/v1/notify/**
        - id: campus-review
          uri: lb://campus-review
          predicates:
            - Path=/api/v1/review/**
        - id: campus-file
          uri: lb://campus-file
          predicates:
            - Path=/api/v1/file/**
        - id: campus-data
          uri: lb://campus-data
          predicates:
            - Path=/api/v1/data/**
        - id: campus-tenant
          uri: lb://campus-tenant
          predicates:
            - Path=/api/v1/tenant/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "http://localhost:3000,http://localhost:5173"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true

campus:
  security:
    white-urls:
      - /api/v1/auth/login
      - /api/v1/auth/login/sms
      - /api/v1/auth/register
      - /api/v1/auth/sms/send
      - /api/v1/product/**
      - /doc.html
      - /v3/api-docs/**
      - /actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3
