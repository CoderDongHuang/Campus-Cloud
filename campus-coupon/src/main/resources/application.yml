server:
  port: 8086

spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/campus_coupon?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    type: com.alibaba.druid.pool.DruidDataSource
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: ${MQ_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

xxl:
  job:
    admin:
      addresses: http://localhost:18080/xxl-job-admin
    executor:
      appname: campus-${spring.application.name}
      port: 9999
